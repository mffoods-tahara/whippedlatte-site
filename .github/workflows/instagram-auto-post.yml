name: Instagram Auto Post

on:
  schedule:
    - cron: "0 5 * * *"  # 05:00 UTC = 14:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r automation/instagram/requirements.txt

      - name: Post to Instagram
        working-directory: automation/instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python post_instagram.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add automation/instagram/state.json automation/instagram/post_log.txt
          git diff --cached --quiet || git commit -m "Instagram自動投稿: 状態更新"
          git push
