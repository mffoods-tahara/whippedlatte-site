name: Instagram Reel Post

on:
  schedule:
    - cron: "0 1 * * 2,5"  # 01:00 UTC = 10:00 JST 火・金（2026-07-16ユーザー承認済み）
  workflow_dispatch:
    inputs:
      dry_run:
        description: "動画生成のみ（Instagramへは投稿しない）"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  reel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-noto-cjk
          pip install -r automation/instagram/requirements.txt

      - name: Generate reel video
        working-directory: automation/instagram
        run: python make_reel.py

      - name: Commit and push video (GitHub Pagesで公開される)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add instagram/reels automation/instagram/reel_state.json automation/instagram/reel_meta.json
          git diff --cached --quiet || git commit -m "リール自動生成: 動画追加"
          git push

      - name: Post reel to Instagram
        if: ${{ github.event_name == 'schedule' || inputs.dry_run == false }}
        working-directory: automation/instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python post_reel.py

      - name: Commit post log
        if: ${{ github.event_name == 'schedule' || inputs.dry_run == false }}
        run: |
          git add automation/instagram/post_log.txt
          git diff --cached --quiet || git commit -m "リール自動投稿: ログ更新"
          git pull --rebase
          git push
